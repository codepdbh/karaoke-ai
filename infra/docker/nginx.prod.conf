upstream karaoke_frontend {
    server frontend:3000;
}

upstream karaoke_backend {
    server backend:8000;
}

upstream ruta_frontend {
    server ruta_frontend:4100;
}

upstream ruta_backend {
    server ruta_backend:4101;
}

upstream sucmul_frontend {
    server sucmul_frontend:80;
}

upstream sucmul_backend {
    server sucmul_backend:3012;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name rutasingluten.lat www.rutasingluten.lat;

    client_max_body_size 100m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name rutasingluten.lat www.rutasingluten.lat;

    ssl_certificate /etc/letsencrypt/live/rutasingluten.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rutasingluten.lat/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $karaoke_backend_url http://backend:8000;
    set $karaoke_frontend_url http://frontend:3000;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /karaoke-ia {
        return 302 /karaoke-ia/dashboard;
    }

    location = /karaoke-ai {
        return 302 /karaoke-ia/dashboard;
    }

    location /karaoke-ai/ {
        rewrite ^/karaoke-ai/(.*)$ /karaoke-ia/$1 redirect;
    }

    location /karaoke-ia/api/ {
        rewrite ^/karaoke-ia(/api/.*)$ $1 break;
        proxy_pass $karaoke_backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /karaoke-ia;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /karaoke-ia/ws/ {
        rewrite ^/karaoke-ia(/ws/.*)$ $1 break;
        proxy_pass $karaoke_backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /karaoke-ia;
        proxy_read_timeout 300s;
    }

    location /karaoke-ia/ {
        proxy_pass $karaoke_frontend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /karaoke-ia;
        proxy_read_timeout 300s;
    }

    location = /suc-mul {
        return 302 /suc-mul/;
    }

    location /suc-mul/api/ {
        rewrite ^/suc-mul(/api/.*)$ $1 break;
        proxy_pass http://sucmul_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /suc-mul;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /suc-mul/uploads/ {
        rewrite ^/suc-mul(/uploads/.*)$ $1 break;
        proxy_pass http://sucmul_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /suc-mul;
        proxy_read_timeout 300s;
    }

    location /suc-mul/docs {
        rewrite ^/suc-mul(/docs.*)$ $1 break;
        proxy_pass http://sucmul_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /suc-mul;
        proxy_read_timeout 300s;
    }

    location /suc-mul/ {
        rewrite ^/suc-mul/(.*)$ /$1 break;
        proxy_pass http://sucmul_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /suc-mul;
        proxy_read_timeout 300s;
    }

    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://ruta_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://ruta_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }

    location /docs {
        proxy_pass http://ruta_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://ruta_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://ruta_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }
}
