upstream karaoke_frontend {
    server frontend:3000;
}

upstream karaoke_backend {
    server backend:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    server_name _;
    return 404;
}

server {
    listen 80;
    server_name rutasingluten.lat www.rutasingluten.lat;

    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location = / {
        return 302 /karaoke-ia/;
    }

    location = /karaoke-ia {
        return 301 /karaoke-ia/;
    }

    location /karaoke-ia/api/ {
        rewrite ^/karaoke-ia(/api/.*)$ $1 break;
        proxy_pass http://karaoke_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /karaoke-ia;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /karaoke-ia/ws/ {
        rewrite ^/karaoke-ia(/ws/.*)$ $1 break;
        proxy_pass http://karaoke_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /karaoke-ia;
        proxy_read_timeout 300s;
    }

    location /karaoke-ia/ {
        proxy_pass http://karaoke_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /karaoke-ia;
        proxy_read_timeout 300s;
    }
}
